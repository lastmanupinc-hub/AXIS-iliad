      - "Payment processing scan shows go_modules in build_tools"

  # ═══════════════════════════════════════════════════════════════════
  # PHASE 8: WIRING — CONTEXT MAP & REPO PROFILE UPDATES
  # Ensure all new data flows through to the output files.
  # ═══════════════════════════════════════════════════════════════════

  eq_085:
    id: "eq_085"
    title: "Wire new fields through ContextMap and RepoProfile"
    depends_on: ["eq_075", "eq_080", "eq_082"]
    files_to_modify:
      - path: "packages/context-engine/src/types.ts"
        changes:
          - description: "Add sql_schema to ContextMap"
            new_field: |
              sql_schema: Array<{
                name: string;
                column_count: number;
                foreign_key_count: number;
                source_file: string;
              }>;

          - description: "Add go_module to ContextMap.project_identity"
            new_field: |
              go_module: string | null;  // e.g. "github.com/org/repo"

      - path: "packages/context-engine/src/engine.ts"
        changes:
          - description: "Populate sql_schema in buildContextMap"
            behavior: |
              sql_schema: parsed.sql_schema.map(t => ({
                name: t.name,
                column_count: t.columns.length,
                foreign_key_count: t.foreign_keys.length,
                source_file: t.source_file,
              })),

          - description: "Populate go_module in buildProjectIdentity"
            behavior: |
              go_module: parsed.go_module?.module_path ?? null,

          - description: "Include domain model count and SQL table count in buildAIContext summary"
            behavior: |
              Append to summary string:
              If domain_models.length > 0: " It defines {N} domain models."
              If sql_schema.length > 0: " The database has {N} tables."

          - description: "Add Go-specific conventions to buildAIContext"
            behavior: |
              if (parsed.go_module?.module_path) conventions.push("Go modules");
              if (parsed.build_tools.includes("make")) conventions.push("Makefile build");

          - description: "Eliminate double parseRepo call"
            location: "buildRepoProfile (line ~35)"
            behavior: |
              Currently buildRepoProfile calls parseRepo(snapshot.files) independently.
              buildContextMap also calls parseRepo. This is wasteful.
              Fix: Accept parsed as a parameter, or cache. Simplest fix:
                export function buildRepoProfile(snapshot: SnapshotRecord, parsed?: ParseResult): RepoProfile
              If parsed is provided, use it. Otherwise call parseRepo internally.
              Update runner.ts to pass parsed from buildContextMap.

    test_file: "packages/context-engine/src/engine.test.ts"
    test_cases:
      - name: "context map includes sql_schema when SQL tables present"
        input: |
          Snapshot with files containing CREATE TABLE statements
        expected: |
          contextMap.sql_schema.length > 0
          Each entry has name, column_count, foreign_key_count, source_file

      - name: "context map includes go_module in project_identity"
        input: |
          Snapshot with go.mod file
        expected: |
          contextMap.project_identity.go_module === "github.com/org/repo"

      - name: "AI context summary mentions domain models when present"
        input: |
          Snapshot with Go struct definitions
        expected: |
          contextMap.ai_context.project_summary includes "domain models"

      - name: "RepoProfile works with pre-parsed data (no double parse)"
        input: |
          Call buildRepoProfile(snapshot, parsed) with pre-parsed data
        expected: |
          Same result as buildRepoProfile(snapshot) but only one parseRepo invocation

    acceptance_criteria:
      - "All 4 new tests pass"
      - "Existing tests still pass"
      - "context-map.json output includes sql_schema, go_module, domain_models"
      - "No double parseRepo call"

  # ═══════════════════════════════════════════════════════════════════
  # VALIDATION: DETERMINISM PROOF
  # ═══════════════════════════════════════════════════════════════════

  eq_086:
    id: "eq_086"
    title: "Determinism test — scan twice, diff zero"
    depends_on: ["eq_075", "eq_076", "eq_077", "eq_078", "eq_079", "eq_080", "eq_081", "eq_082", "eq_083", "eq_084", "eq_085"]
    files_to_modify:
      - path: "apps/cli/src/determinism.test.ts"
        create: true
        changes:
          - description: "Integration test: run pipeline twice on same input, assert identical output"
            behavior: |
              1. Create a fixture set of FileEntry[] representing a small polyglot project:
                 - go.mod, main.go, handler/user.go, handler/user_test.go
                 - package.json, src/App.tsx, src/types.ts
                 - schema.sql with CREATE TABLE
                 - Makefile, Dockerfile
              2. Call run(scanResult, "/fake/project") twice
              3. JSON.stringify both GeneratorResult.files arrays
              4. Assert strict equality: result1 === result2
              5. Also verify: project_type is "fullstack_web" (not "static_site")
              6. Also verify: context-map.json contains go_module, sql_schema, domain_models
              7. Also verify: frameworks include at least one Go framework and React

    test_cases:
      - name: "pipeline produces byte-identical output on repeated runs"
        expected: "JSON.stringify(run1.files) === JSON.stringify(run2.files)"

      - name: "polyglot fixture classifies as fullstack_web"
        expected: "project_type === 'fullstack_web'"

      - name: "polyglot fixture detects Go and JS frameworks"
        expected: "frameworks include 'React' and a Go framework"

      - name: "polyglot fixture has non-zero separation score"
        expected: "separation_score > 0"

      - name: "polyglot fixture extracts SQL tables"
        expected: "sql_schema.length > 0"

      - name: "polyglot fixture extracts domain models"
        expected: "domain_models.length > 0"

    acceptance_criteria:
      - "All 6 new tests pass"
      - "Full suite passes: npx vitest run shows all green"
      - "This is the FINAL gate — do not mark phase complete until this passes"

